<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Card</title>
  <style>
    @property --rotate {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4rem;
      overflow: hidden;
      position: relative;
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .card-container {
      perspective: 1000px;
    }

    .card {
      width: 400px;
      height: 550px;
      background: #ffffff0d;
      backdrop-filter: blur(10px);
      border: 1px solid #ffffff1a;
      border-radius: 20px;
      padding: 40px;
      position: relative;
      cursor: pointer;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-20px) rotateX(10deg);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: conic-gradient(
        from var(--rotate),
        #ff0080 0deg,
        #7928ca 72deg,
        #4299e1 144deg,
        #48bb78 216deg,
        #ff0080 288deg,
        #7928ca 360deg
      );
      border-radius: 22px;
      z-index: -2;
      animation: rotate 4s linear infinite;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 2px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 18px;
      z-index: -1;
    }

    @keyframes rotate {
      0% { --rotate: 0deg; }
      100% { --rotate: 360deg; }
    }

    .card-inner {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;
    }

    .icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-family: 'Courier New', monospace;
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(to right, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      letter-spacing: 1px;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #667eea;
      border-radius: 50%;
      pointer-events: none;
      animation: rise 4s infinite;
      opacity: 0;
    }

    @keyframes rise {
      0% {
        bottom: -10px;
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        bottom: 100%;
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .card {
        width: 90vw;
        height: 70vh;
      }
      
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="card-container">
    <div class="card">
      <div class="card-inner">
        <div class="icon">✨</div>
        <h1>Tripathi Dev Lab</h1>
        <p>Please Like, Share & Subscribe</p>
      </div>
      <div class="particle" style="left: 20%; animation-delay: 0s;"></div>
      <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
      <div class="particle" style="left: 60%; animation-delay: 2s;"></div>
      <div class="particle" style="left: 80%; animation-delay: 1.5s;"></div>
    </div>
  </div>

  <script>
    const starsContainer = document.querySelector('.stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>

</html>
