<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Card</title>
  <style>
    @property --rotate {
      syntax: "<angle>";
      initial-value: 132deg;
      inherits: false;
    }

    :root {
      --card-height: 65vh;
      --card-width: calc(var(--card-height) / 1.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0e27;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: #191c29;
      width: var(--card-width);
      height: var(--card-height);
      padding: 3px;
      position: relative;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card::before {
      content: "";
      width: 104%;
      height: 102%;
      border-radius: 14px;
      background-image: linear-gradient(
        var(--rotate), 
        #ff006e,
        #8338ec,
        #3a86ff,
        #06ffa5
      );
      position: absolute;
      z-index: -1;
      top: -1%;
      left: -2%;
      animation: spin 3s linear infinite;
    }

    .card::after {
      position: absolute;
      content: "";
      top: calc(var(--card-height) / 6);
      left: 0;
      right: 0;
      z-index: -1;
      height: 100%;
      width: 100%;
      margin: 0 auto;
      transform: scale(0.8);
      filter: blur(calc(var(--card-height) / 6));
      background-image: linear-gradient(
        var(--rotate), 
        #ff006e,
        #8338ec,
        #3a86ff,
        #06ffa5
      );
      opacity: 0.8;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      0% {
        --rotate: 0deg;
      }
      100% {
        --rotate: 360deg;
      }
    }

    a {
      color: #06ffa5;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 14px 32px;
      border: 2px solid #06ffa5;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    a:hover {
      background: #06ffa5;
      color: #0a0e27;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(6, 255, 165, 0.3);
    }
  </style>
</head>

<body>
  <div class="card">
    MAGIC CARD
  </div>

  <a href="https://github.com/pawan8705/" target="_blank">Pawan Tripathi</a>
</body>

</html>
