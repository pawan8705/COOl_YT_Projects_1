<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Card</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      background-color: #465461;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
    }

    .card {
      width: 500px;
      height: 500px;
      background-color: MidnightBlue;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 2px solid #caca00;
    }

    .card canvas {
      display: block;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="star-card"></div>
  </div>

  <script>
    let stars = [];

    new p5(function(p) {
      p.setup = function() {
        let canvas = p.createCanvas(500, 500);
        canvas.parent('star-card');
      };

      p.draw = function() {
        p.clear();

        for (let i = stars.length - 1; i >= 0; i--) {
          stars[i].update(p);
          stars[i].display(p);
        }
      };

      p.mouseMoved = function() {
        // get position relative to canvas
        let card = document.getElementById('star-card');
        let rect = card.getBoundingClientRect();
        let mx = p.mouseX;
        let my = p.mouseY;

        if (mx >= 0 && my >= 0 && mx <= p.width && my <= p.height) {
          stars.push(new Star(mx, my, p));
        }
      };
    });

    class Star {
      constructor(x, y, p) {
        this.x = x;
        this.y = y;
        this.radius = p.random(1, 5);
        this.alpha = 255;
        this.angle = p.random(p.TWO_PI);
        this.speed = p.random(1, 3);
        this.color = p.color(p.random(180, 255), p.random(180, 255), p.random(50, 255));
      }

      update(p) {
        this.x += p.cos(this.angle) * this.speed;
        this.y += p.sin(this.angle) * this.speed;
        this.alpha -= 4;

        if (this.alpha <= 0) {
          stars.splice(stars.indexOf(this), 1);
        }
      }

      display(p) {
        p.noStroke();
        this.color.setAlpha(this.alpha);
        p.fill(this.color);
        p.push();
        p.translate(this.x, this.y);
        p.rotate(p.frameCount * 0.02);
        drawStar(p, 0, 0, this.radius * 2, this.radius, 5);
        p.pop();
      }
    }

    function drawStar(p, x, y, radius1, radius2, npoints) {
      let angle = p.TWO_PI / npoints;
      let halfAngle = angle / 2.0;
      p.beginShape();
      for (let a = 0; a < p.TWO_PI; a += angle) {
        let sx = x + p.cos(a) * radius2;
        let sy = y + p.sin(a) * radius2;
        p.vertex(sx, sy);
        sx = x + p.cos(a + halfAngle) * radius1;
        sy = y + p.sin(a + halfAngle) * radius1;
        p.vertex(sx, sy);
      }
      p.endShape(p.CLOSE);
    }
  </script>
</body>
</html>
