<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Animation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background-color: #0d0d0d;
      margin: 10%;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      height: 200vh;
    }

    .text {
      font-size: 10vw;
      letter-spacing: -0.01em;
      line-height: 100%;
      margin: 0;
      width: 100%;
      color: rgb(182, 182, 182, 0.2);
      background: linear-gradient(to right, #b6b6b6, #b6b6b6) no-repeat;
      -webkit-background-clip: text;
      background-clip: text;
      background-size: 0%;
      transition: background-size cubic-bezier(0.1, 0.5, 0.5, 1) 0.5s;
      border-bottom: 1px solid #2f2b28;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      animation-name: reveal;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      animation-timeline: view();
      animation-range: entry 100% cover 50%;
    }

    @keyframes reveal {
      to {
        background-size: 100%;
      }
    }

    span {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      background-color: #4246ce;
      color: #0d0d0d;
      clip-path: polygon(0 50%, 100% 50%, 100% 50%, 0 50%);
      transform-origin: center;
      transition: all cubic-bezier(0.1, 0.5, 0.5, 1) 0.4s;
      display: flex;
      align-items: center;
    }

    .text:hover>span {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    h1 {
      cursor: pointer;
    }

    .sm_text {
      font-size: 7.5vw;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="text">TRIPATHI<span>DEV LAB</span></h1>
    <h1 class="text">LIKE<span class="sm_text">SHARE & SUBSCRIBE</span></h1>
    <h1 class="text">FOLLOW<span>FOR MORE</span></h1>
    <h1 class="text">SOURCE CODE<span class="sm_text">IN DESCRIPTION</span></h1>
    <h1 class="text">LEARN<span>BUILD & GROW</span></h1>
  </div>
</body>

</html>
