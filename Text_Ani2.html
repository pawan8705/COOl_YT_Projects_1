<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripathi Dev Lab - Interactive Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background particles */
    .bg-particles {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(66, 70, 206, 0.1);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    .particle:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { width: 60px; height: 60px; left: 70%; animation-delay: 2s; }
    .particle:nth-child(3) { width: 100px; height: 100px; left: 40%; animation-delay: 4s; }
    .particle:nth-child(4) { width: 40px; height: 40px; left: 80%; animation-delay: 1s; }
    .particle:nth-child(5) { width: 70px; height: 70px; left: 25%; animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
      25% { transform: translateY(-100px) rotate(90deg); opacity: 0.3; }
      50% { transform: translateY(-200px) rotate(180deg); opacity: 0.2; }
      75% { transform: translateY(-100px) rotate(270deg); opacity: 0.3; }
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10vh 5vw;
      position: relative;
      z-index: 1;
    }

    /* Header section */
    .header {
      text-align: center;
      margin-bottom: 8vh;
      opacity: 0;
      animation: fadeInDown 1s ease-out forwards;
    }

    .logo {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #4246ce, #00d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    .tagline {
      color: #b6b6b6;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Text items */
    .text-wrapper {
      width: 100%;
      max-width: 1400px;
      margin: 2vh 0;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .text-wrapper:nth-child(2) { animation-delay: 0.2s; }
    .text-wrapper:nth-child(3) { animation-delay: 0.4s; }
    .text-wrapper:nth-child(4) { animation-delay: 0.6s; }
    .text-wrapper:nth-child(5) { animation-delay: 0.8s; }
    .text-wrapper:nth-child(6) { animation-delay: 1s; }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .text {
      font-size: clamp(2rem, 8vw, 10vw);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin: 0;
      padding: 2vh 2vw;
      width: 100%;
      color: rgba(182, 182, 182, 0.15);
      background: linear-gradient(to right, #ffffff, #4246ce) no-repeat;
      -webkit-background-clip: text;
      background-clip: text;
      background-size: 0%;
      transition: all cubic-bezier(0.1, 0.5, 0.5, 1) 0.6s;
      border-bottom: 1px solid rgba(66, 70, 206, 0.1);
      position: relative;
      display: flex;
      align-items: center;
      cursor: pointer;
      overflow: hidden;
    }

    .text::before {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(to right, #4246ce, #00d4ff);
      transition: width 0.6s cubic-bezier(0.1, 0.5, 0.5, 1);
    }

    .text:hover::before {
      width: 100%;
    }

    /* Scroll animation */
    @supports (animation-timeline: view()) {
      .text {
        animation: reveal linear forwards;
        animation-timeline: view();
        animation-range: entry 100% cover 40%;
      }

      @keyframes reveal {
        to {
          background-size: 100%;
        }
      }
    }

    /* Fallback for browsers that don't support animation-timeline */
    @supports not (animation-timeline: view()) {
      .text {
        background-size: 100%;
      }
    }

    span {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      background: linear-gradient(135deg, #4246ce, #5b21b6);
      color: #ffffff;
      clip-path: polygon(0 50%, 100% 50%, 100% 50%, 0 50%);
      transform-origin: center;
      transition: all cubic-bezier(0.1, 0.5, 0.5, 1) 0.5s;
      display: flex;
      align-items: center;
      padding: 0 2vw;
      font-size: clamp(1.5rem, 6vw, 8vw);
      box-shadow: 0 10px 40px rgba(66, 70, 206, 0);
    }

    .text:hover > span {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      box-shadow: 0 10px 40px rgba(66, 70, 206, 0.4);
    }

    /* Stagger animation for multiple spans */
    span:nth-child(2) {
      transition-delay: 0.05s;
      background: linear-gradient(135deg, #5b21b6, #ec4899);
    }

    span:nth-child(3) {
      transition-delay: 0.1s;
      background: linear-gradient(135deg, #ec4899, #f97316);
    }

    /* Ripple effect on click */
    .text::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      background: radial-gradient(circle, rgba(66, 70, 206, 0.3) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    .text:active::after {
      opacity: 1;
      animation: ripple 0.6s ease-out;
    }

    @keyframes ripple {
      from {
        transform: scale(0);
        opacity: 1;
      }
      to {
        transform: scale(2);
        opacity: 0;
      }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 5vh 0;
      color: rgba(182, 182, 182, 0.5);
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      opacity: 0;
      animation: fadeIn 1s ease-out 1.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 5vh 3vw;
      }

      .text {
        padding: 2vh 4vw;
      }

      span {
        padding: 0 4vw;
      }

      .particle {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .header {
        margin-bottom: 5vh;
      }

      .text-wrapper {
        margin: 1vh 0;
      }

      .text {
        font-size: clamp(1.5rem, 10vw, 3rem);
      }

      span {
        font-size: clamp(1rem, 8vw, 2rem);
      }
    }

    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #4246ce, #5b21b6);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #5b21b6, #ec4899);
    }
  </style>
</head>

<body>
  <!-- Background particles -->
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">TRIPATHI DEV LAB</div>
      <div class="tagline">Innovation • Design • Development</div>
    </div>

    <!-- Text items -->
    <div class="text-wrapper">
      <h1 class="text">TRIPATHI<span>DEV LAB</span></h1>
    </div>

    <div class="text-wrapper">
      <h1 class="text">LIKE<span>SHARE & SUBSCRIBE</span></h1>
    </div>

    <div class="text-wrapper">
      <h1 class="text">FOLLOW<span>FOR MORE</span></h1>
    </div>

    <div class="text-wrapper">
      <h1 class="text">SOURCE CODE<span>IN GITHUB</span></h1>
    </div>

    <div class="text-wrapper">
      <h1 class="text">LEARN<span>BUILD & GROW</span></h1>
    </div>

    <!-- Footer -->
    <div class="footer">
      © 2024 Tripathi Dev Lab • Crafted with passion
    </div>
  </div>

  <script>
    // Add hover sound effect (optional)
    document.querySelectorAll('.text').forEach(text => {
      text.addEventListener('mouseenter', () => {
        text.style.transform = 'translateX(10px)';
      });
      
      text.addEventListener('mouseleave', () => {
        text.style.transform = 'translateX(0)';
      });
    });

    // Intersection Observer for scroll animations (fallback)
    if (!CSS.supports('animation-timeline: view()')) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.backgroundSize = '100%';
          }
        });
      }, { threshold: 0.5 });

      document.querySelectorAll('.text').forEach(text => {
        observer.observe(text);
      });
    }
  </script>
</body>

</html>
